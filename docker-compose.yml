version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: emotia_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - emotia_net

  redis:
    image: redis:7-alpine
    container_name: emotia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - emotia_net

  backend:
    build: ./backend
    container_name: emotia_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    networks:
      - emotia_net

  frontend:
    build: ./frontend
    container_name: emotia_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - emotia_net

volumes:
  postgres_data:

networks:
  emotia_net:
    driver: bridge
